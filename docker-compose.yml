version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./prakriti.db:/app/prakriti.db
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
